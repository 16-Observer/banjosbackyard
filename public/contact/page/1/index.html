<!doctype html><html lang=en-us><head><title>https://banjosbackyardfarm.com/contact/</title><link rel=canonical href=https://banjosbackyardfarm.com/contact/><meta charset=utf-8><meta http-equiv=refresh content="0; url=https://banjosbackyardfarm.com/contact/"><style>
.home-gallery{display:grid!important;grid-template-columns:repeat(3,1fr)!important;gap:4px;margin:1rem 0}
.home-gallery img{display:block!important;width:100%!important;height:200px!important;object-fit:cover!important;margin:0!important;max-width:100%!important}
.home-gallery img:hover{opacity:.85}
@media(max-width:600px){.home-gallery{grid-template-columns:repeat(2,1fr)!important}}
.rover-card{margin:1.25rem 0 1.5rem;max-width:420px}
.rover-card-inner{border:1.5px solid #d0e8d8;border-radius:10px;padding:1.1rem 1.25rem 1.2rem;background:#f2faf5}
.rover-top{margin-bottom:.6rem}
.rover-badge{display:inline-block;font-size:.7rem;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:#00824e;background:#d0f0e0;border-radius:4px;padding:2px 8px}
.rover-title{font-size:1.15rem;font-weight:600;color:#1a2e22;margin-bottom:.3rem}
.rover-tagline{font-size:.9rem;color:#3d5c47;margin-bottom:.75rem}
.rover-details{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:1rem}
.rover-details span{font-size:.78rem;color:#2e5c3a;background:#c8ecd6;border-radius:4px;padding:3px 9px}
.rover-btn{display:inline-block;background:#00AA70;color:#fff!important;text-decoration:none!important;font-size:.9rem;font-weight:600;padding:.5rem 1.1rem;border-radius:6px}
.rover-btn:hover{background:#00824e}
.post-content form{max-width:500px;margin:1rem 0}
.post-content form label{display:block;margin-bottom:.875rem}
.post-content form input[type=text],.post-content form input[type=email],.post-content form textarea{display:block;width:100%;padding:.5rem .75rem;margin-top:.25rem;border:1.5px solid #aaa;border-radius:6px;background:#ffffff;color:#222;font-size:1rem;box-sizing:border-box}
.post-content form input[type=text]:focus,.post-content form input[type=email]:focus,.post-content form textarea:focus{outline:none;border-color:#5C6B4A}
.post-content form textarea{resize:vertical}
.post-content form button[type=submit]{margin-top:.5rem;padding:.5rem 1.5rem;background:var(--primary,#555);color:var(--theme,#fff);border:none;border-radius:6px;font-size:1rem;cursor:pointer}
.post-content form button[type=submit]:hover{opacity:.85}
</style></head></html>
