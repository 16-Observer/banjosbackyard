<!-- DM Mono for consistent nav font across all pages -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<!-- Custom styles -->
<link rel="stylesheet" href="/css/custom.css">
{{- if eq .RelPermalink "/whats-growing/" }}
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/whats-growing.css">
{{- end }}
{{- if eq .RelPermalink "/tree-farm/" }}
<link rel="stylesheet" href="/css/tree-farm.css">
{{- end }}

<!-- Custom site metadata and LocalBusiness JSON-LD -->
{{- /* Adds keywords meta and LocalBusiness JSON-LD for SEO and local search */ -}}
{{ with .Site.Params.seo.keywords }}<meta name="keywords" content="{{ delimit . ", " }}">{{ end }}

<script type="application/ld+json">
{{- $name := .Site.Title -}}
{{- $base := .Site.BaseURL -}}
{{- $phone := .Site.Params.phone -}}
{{- $email := .Site.Params.email -}}
{{- $desc := "Banjo's Backyard Farm — permaculture homestead near Monroe, WA. Farm fresh eggs, superhot and rare pepper starts (7 Pot, Aji, Sugar Rush Peach, Reaper crosses, and more), heirloom tomato seedlings, fruit trees, and food forest plants. Pickup off State Route 203." -}}
{{- $keywords := .Site.Params.seo.keywords -}}
{{- $addrStreet := "23333 State Route 203" -}}
{{- $addrLocality := "Monroe" -}}
{{- $addrRegion := "WA" -}}
{{- $addrPostal := "98272" -}}
{
  "@context": "https://schema.org",
  "@type": "LocalBusiness",
  "name": "{{ $name }}",
  "image": "{{ $base }}images/3489c863-6493-4b40-b599-922e90dfc5f8.png",
  "url": "{{ $base }}",
  "telephone": "{{ $phone }}",
  "email": "{{ $email }}",
  "address": {
    "@type": "PostalAddress",
    "streetAddress": "{{ $addrStreet }}",
    "addressLocality": "{{ $addrLocality }}",
    "addressRegion": "{{ $addrRegion }}",
    "postalCode": "{{ $addrPostal }}",
    "addressCountry": "US"
  },
  "description": "{{ $desc }}",
  "openingHoursSpecification": [
    {
      "@type": "OpeningHoursSpecification",
      "dayOfWeek": ["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"],
      "opens": "08:00",
      "closes": "20:00"
    }
  ],
  "keywords": {{ jsonify $keywords }}
}
</script>
