baseURL = "https://banjosbackyardfarm.com"
languageCode = "en-us"
title = "Banjo's Backyard Farm"
theme = "PaperMod"
relativeURLs = true

# Site description used by themes and meta tags
description = "Permaculture homestead near Monroe, WA — farm fresh eggs, superhot &amp; rare pepper starts, heirloom tomato seedlings, fruit trees, and food forest plants."

[params]
  author = "Banjo's Backyard Farm"
  email = "austingolney@gmail.com"
  phone = "(765) 831-2337"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[menu]
  [[menu.main]]
    identifier = "home"
    name = "Home"
    url = "/"
    weight = 10
  [[menu.main]]
    identifier = "contact"
    name = "Contact Us"
    url = "/contact/"
    weight = 20
  [[menu.main]]
    identifier = "products"
    name = "Products"
    url = "/products/"
    weight = 30
  [[menu.main]]
    identifier = "blog"
    name = "Blog"
    url = "/posts/"
    weight = 40
  [[menu.main]]
    identifier = "about"
    name = "About"
    url = "/about/"
    weight = 50

[params.social]
  instagram = "https://instagram.com/Banjos.Backyard"
  venmo = "https://venmo.com/banjosbackyard"
  email = "mailto:austingolney@gmail.com"

[params.seo]
  keywords = [
    "farm fresh eggs", "local eggs Monroe WA", "homestead", "permaculture",
    "pepper starts", "tomato starts", "hot pepper seedlings", "superhot pepper plants",
    "rare pepper varieties", "heirloom tomato starts", "pepper preorder",
    "7 Pot pepper", "Aji pepper", "Sugar Rush Peach pepper",
    "backyard nursery Monroe WA", "fruit trees for sale Monroe WA",
    "food forest", "orchard trees Washington state",
    "dog sitting Monroe WA", "dog boarding Monroe WA"
  ]
  twitter = "@banjosbackyard"
  description = "Banjo's Backyard Farm — permaculture homestead near Monroe, WA. Farm fresh eggs, superhot and rare pepper starts, heirloom tomato seedlings, fruit trees, and orchard plants. Pickup off State Route 203."
