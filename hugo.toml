baseURL = "https://banjosbackyardfarm.com"
languageCode = "en-us"
title = "Banjo's Backyard Farm"
theme = "PaperMod"
relativeURLs = true

# Site description used by themes and meta tags
description = "A permaculture homestead offering farm fresh eggs, pickup off State 203 near Monroe, WA."

[params]
  author = "Banjo's Backyard Farm"
  email = "austingolney@gmail.com"
  phone = "(765) 831-2337"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[menu]
  [[menu.main]]
    identifier = "home"
    name = "Home"
    url = "/"
    weight = 10
  [[menu.main]]
    identifier = "contact"
    name = "Contact Us"
    url = "/contact/"
    weight = 20
  [[menu.main]]
    identifier = "products"
    name = "Products"
    url = "/products/"
    weight = 30
  [[menu.main]]
    identifier = "blog"
    name = "Blog"
    url = "/posts/"
    weight = 40
  [[menu.main]]
    identifier = "about"
    name = "About"
    url = "/about/"
    weight = 50

[params.social]
  instagram = "https://instagram.com/Banjos.Backyard"
  venmo = "https://venmo.com/banjosbackyard"
  email = "mailto:austingolney@gmail.com"

[params.seo]
  keywords = ["farm fresh eggs", "homestead", "permaculture", "Monroe WA", "local eggs"]
  twitter = "@banjosbackyard"
  description = "Banjos Backyard Farm — permaculture homestead offering farm fresh eggs, trees, and nursery starts. Pickup off State 203 near Monroe, WA."
